version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: omra-postgres
    environment:
      POSTGRES_DB: omra_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: quay.io/minio/minio:latest
    container_name: omra-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  redis:
    image: redis:7-alpine
    container_name: omra-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: omra-backend
    environment:
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: omra_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      STORAGE_TYPE: minio
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_BUCKET: omra-files
      JWT_SECRET: your-256-bit-secret-key-for-jwt-signing-must-be-long-enough-for-hs256
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    # Optional: uncomment to use Redis
    # depends_on:
    #   redis:
    #     condition: service_healthy

volumes:
  postgres_data:
  minio_data:
