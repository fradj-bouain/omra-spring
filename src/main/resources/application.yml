spring:
  application:
    name: omra-platform

  # PostgreSQL : définir DB_PASSWORD (et DB_USERNAME si besoin) selon votre installation.
  # Ex. : set DB_PASSWORD=votre_mot_de_passe_postgres && mvn spring-boot:run
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    # update = crée les tables manquantes et met à jour le schéma (dev). En prod, préférer validate + Flyway/Liquibase.
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        default_schema: public
        format_sql: true
        jdbc:
          batch_size: 25
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# JWT
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-signing-must-be-long-enough}
  access-token-validity: 900
  refresh-token-validity: 86400

# Storage
# - local (défaut) : dossier local-path, servi via GET /uploads/** (pas besoin de MinIO).
# - minio : fichiers sur MinIO/S3 (démarrer MinIO ou définir STORAGE_ENDPOINT).
storage:
  type: ${STORAGE_TYPE:local}
  endpoint: ${STORAGE_ENDPOINT:http://localhost:9000}
  access-key: ${STORAGE_ACCESS_KEY:minioadmin}
  secret-key: ${STORAGE_SECRET_KEY:minioadmin}
  bucket: ${STORAGE_BUCKET:omra-files}
  region: ${STORAGE_REGION:us-east-1}
  # Chemin absolu recommandé (évite Tomcat/temp). Surcharge : STORAGE_LOCAL_PATH
  local-path: ${STORAGE_LOCAL_PATH:${user.home}/omra-uploads}
  # Ex. https://api.votredomaine.com — pour que file_url soit une URL absolue (Angular sur autre port)
  public-base-url: ${STORAGE_PUBLIC_BASE_URL:}

# Default super admin (User - créé au premier démarrage si activé)
app:
  default-super-admin:
    enabled: ${DEFAULT_SUPER_ADMIN_ENABLED:true}
    email: ${DEFAULT_SUPER_ADMIN_EMAIL:superadmin@omra.local}
    password: ${DEFAULT_SUPER_ADMIN_PASSWORD:SuperAdmin123!}
  # Platform Admin (table admins) - can create agencies and activate/deactivate
  default-admin:
    enabled: ${DEFAULT_ADMIN_ENABLED:true}
    username: ${DEFAULT_ADMIN_USERNAME:superadmin}
    email: ${DEFAULT_ADMIN_EMAIL:superadmin@omra.local}
    password: ${DEFAULT_ADMIN_PASSWORD:SuperAdmin123!}
  # Referral (parrainage) base URL for referral links
  referral:
    base-url: ${REFERRAL_BASE_URL:https://myapp.com}
  # Traductions UI : upsert au démarrage depuis i18n/ui-translations.seed.json (voir tools/generate-ui-translations.mjs)
  i18n:
    seed:
      enabled: ${I18N_SEED_ENABLED:true}

# API (default 8081 to avoid conflict if 8080 is in use; set PORT=8080 to use 8080)
server:
  port: ${PORT:8080}

# Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
